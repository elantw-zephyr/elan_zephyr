# EM32F967 All-WKUP-Pin Sample
#
# Wakes from PDSW2 (Standby1) with the 32 kHz oscillator OFF (RTC disabled)
# using any of the seven external WakeUp sources:
#   WKUP1 PA6,  WKUP2 PA14, WKUP3 PA15,
#   WKUP4 PB3,  WKUP5 PB7,  WKUP6 PB8,  WKUP7 PB9

# -------- Power management --------
CONFIG_PM=y
# Required by CONFIG_EM32_WKUP_PINS (transitive). We do not actually call
# sys_poweroff() — the chip enters PDSW2 via pm_state_force().
CONFIG_POWEROFF=y

# -------- EM32 WakeUp controller glue --------
# Activates Phase-1 registration (gpio_em32.c :: em32_pwr_wkup_pin_cfg_gpio)
# and Phase-2 hardware activation (em32_pwr_wkup_pin_cfg_pupd) which is
# invoked from soc/elan/em32f967/power.c :: pm_handle_standby_modes() before
# entering PDSW2.
CONFIG_EM32_WKUP_PINS=y

# -------- GPIO / pinctrl --------
CONFIG_GPIO=y
CONFIG_GPIO_EM32=y
CONFIG_PINCTRL=y
CONFIG_PINCTRL_EM32=y

# -------- Console / logging --------
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_EM32=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
# Immediate mode so PM traces print even if the chip resets on wake
# (WakeUp controller asserts system RESET for most wake events in PDSW2).
CONFIG_LOG_MODE_IMMEDIATE=y

# -------- Kernel --------
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BUILD_OUTPUT_INFO_HEADER=y
