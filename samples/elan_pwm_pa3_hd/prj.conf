# Enable PWM driver
CONFIG_PWM=y
CONFIG_PWM_LOG_LEVEL_DBG=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BUFFER_SIZE=8192

# Enable pinctrl - PA3 high-drive is configured through the
# `drive-strength = <1>` property on the pwmb_pa3_n pinctrl node.
CONFIG_PINCTRL=y
