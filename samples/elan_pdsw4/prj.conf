# EM32F967 PDSW4 Power Management Sample Configuration

# Enable system power management
CONFIG_PM=y

# Kernel / stack configuration
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Use immediate logging so that power-management driver logs are printed
# even if the system enters deep sleep or resets before the log buffer
# can be flushed. This is important for debugging PDSW2/PDSW4 behavior.
CONFIG_LOG_MODE_IMMEDIATE=y

# Console output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable build header (for build time, etc.)
CONFIG_BUILD_OUTPUT_INFO_HEADER=y
