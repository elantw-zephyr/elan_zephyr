# EM32F967 All-Port-B PWM Sample

# ---- PWM driver ----
CONFIG_PWM=y
CONFIG_PWM_LOG_LEVEL_DBG=y

# ---- Pinctrl ----
CONFIG_PINCTRL=y
CONFIG_PINCTRL_EM32=y
CONFIG_PINCTRL_LOG_LEVEL_DBG=y

# ---- Console / logging ----
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_EM32=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=8192

# ---- Kernel ----
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_BUILD_OUTPUT_INFO_HEADER=y
