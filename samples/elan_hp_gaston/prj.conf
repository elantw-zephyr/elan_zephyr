# GPIO driver (PA14 out, PB8/PA15/PB3 in, PB9 out)
CONFIG_GPIO=y
CONFIG_GPIO_EM32=y

# Pinctrl: SPI2 mux, PA3 high-drive, PB3 PU1 strong pull-up + drive strength
CONFIG_PINCTRL=y
CONFIG_PINCTRL_EM32=y

# SPI2 loopback test
CONFIG_SPI=y

# PWMB_N on PA3
CONFIG_PWM=y

# Console output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=8192
